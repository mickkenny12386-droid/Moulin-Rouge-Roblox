<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Netherlands</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --glass: rgba(10, 10, 10, 0.95); --border: rgba(151, 215, 46, 0.4); }
        body { margin: 0; background: linear-gradient(0deg, #000 0%, #050505 40%, #1a3300 100%); background-attachment: fixed; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; }
        nav { background: rgba(0,0,0,0.9); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; cursor: pointer; margin-left: 20px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 20px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .section-box.active { display: block; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: 800; cursor: pointer; border-radius: 8px; text-transform: uppercase; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: white; box-shadow: 0 0 15px var(--emerald); }
        .btn-red { background: #ff4444; color: white; }

        .admin-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 10px; text-align: center; border-radius: 5px; }
        .day.has-show { border-color: var(--emerald); background: rgba(151, 215, 46, 0.1); cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div style="font-family: 'Cinzel'; font-size: 24px;">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">The Show</a>
            <a onclick="showSection('yourvisit')">Your Visit</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin')">Admin</a>
            <a id="auth-btn" onclick="showSection('auth-section')">Log In / Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <section id="auth-section" class="section-box">
            <h2 id="auth-title">Login</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Login</button>
            <button class="btn" style="background:transparent; color:white; border:1px solid white;" onclick="handleAuth('signup')">Create Account</button>
            <p style="text-align:center; margin-top:20px; color:gold; cursor:pointer;" onclick="adminLoginPrompt()">Admin Login</p>
        </section>

        <section id="theshow" class="section-box active">
            <h2>Select a Date</h2>
            <div class="calendar-grid" id="calendar"></div>
            <div id="booking-ui" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                <h3 id="book-date-label"></h3>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span>Rank 1, 2 or 3 (Total Tickets):</span>
                    <input type="number" id="ticket-qty" value="1" min="1" max="10" style="width:60px;">
                </div>
                <button class="btn" onclick="bookTickets()">Confirm FREE Reservation</button>
            </div>
        </section>

        <section id="yourvisit" class="section-box">
            <h2>Your Tickets</h2>
            <div id="my-tickets-list">Please log in to see your tickets.</div>
        </section>

        <section id="audities" class="section-box">
            <h2>Audition for a Role</h2>
            <div id="aud-form">
                <input type="text" id="aud-role" placeholder="Desired Role (e.g. Elphaba, Glinda, Ensemble)">
                <input type="text" id="aud-discord" placeholder="Discord Username">
                <textarea id="aud-exp" placeholder="Your Experience..."></textarea>
                <button class="btn" onclick="submitAudition()">Submit Audition</button>
            </div>
            <div id="aud-status" style="display:none; text-align:center; padding:20px;"></div>
        </section>

        <section id="admin" class="section-box">
            <h2 style="color:gold;">Witch Master Dashboard</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <h3>Add Show</h3>
                    <input type="number" id="adm-day" placeholder="Day">
                    <input type="text" id="adm-time" placeholder="Time">
                    <button class="btn" onclick="addShow()">Add Show</button>
                </div>
                <div>
                    <h3>Current Shows</h3>
                    <div id="adm-show-list"></div>
                </div>
            </div>
            <h3 style="margin-top:30px;">Pending Auditions</h3>
            <div id="adm-aud-list"></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let selectedDate = null;

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- AUTH ---
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(type === 'signup') await auth.createUserWithEmailAndPassword(email, pass);
                else await auth.signInWithEmailAndPassword(email, pass);
                alert("Success!");
                location.reload();
            } catch(e) { alert(e.message); }
        }

        function adminLoginPrompt() {
            const code = prompt("Enter Admin Access Name:");
            if(code === "Virtualentertainment2025!") {
                localStorage.setItem('is_admin', 'true');
                location.reload();
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-btn').innerText = user.email;
                loadMyTickets(user.uid);
                checkAuditionStatus(user.uid);
            }
            if(localStorage.getItem('is_admin') === 'true') {
                document.getElementById('admin-nav').style.display = 'block';
                loadAdminData();
            }
        });

        // --- SHOWS & TICKETS ---
        async function loadCalendar() {
            const cal = document.getElementById('calendar');
            const snap = await db.collection('shows').get();
            const shows = {};
            snap.forEach(doc => shows[doc.data().day] = {id: doc.id, ...doc.data()});
            cal.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const s = shows[i];
                const d = document.createElement('div');
                d.className = `day ${s ? 'has-show' : ''}`;
                d.innerHTML = `<b>${i}</b><br><small>${s ? s.time : ''}</small>`;
                if(s) d.onclick = () => {
                    selectedDate = `March ${i}th, ${s.time}`;
                    document.getElementById('book-date-label').innerText = "Booking for " + selectedDate;
                    document.getElementById('booking-ui').style.display = 'block';
                };
                cal.appendChild(d);
            }
        }

        async function bookTickets() {
            const user = auth.currentUser;
            if(!user) return alert("Login first!");
            await db.collection('bookings').add({
                uid: user.uid,
                date: selectedDate,
                qty: document.getElementById('ticket-qty').value,
                timestamp: Date.now()
            });
            alert("Reserved!");
            location.reload();
        }

        async function loadMyTickets(uid) {
            const snap = await db.collection('bookings').where('uid', '==', uid).get();
            const list = document.getElementById('my-tickets-list');
            if(snap.empty) { list.innerHTML = "No tickets yet."; return; }
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="admin-item"><b>${d.date}</b><br>Tickets: ${d.qty}</div>`;
            });
        }

        // --- AUDITIONS ---
        async function submitAudition() {
            const user = auth.currentUser;
            if(!user) return alert("Login first!");
            await db.collection('auditions').doc(user.uid).set({
                role: document.getElementById('aud-role').value,
                discord: document.getElementById('aud-discord').value,
                exp: document.getElementById('aud-exp').value,
                status: 'pending',
                reason: ''
            });
            location.reload();
        }

        function checkAuditionStatus(uid) {
            db.collection('auditions').doc(uid).onSnapshot(doc => {
                if(!doc.exists()) return;
                const d = doc.data();
                const ui = document.getElementById('aud-status');
                document.getElementById('aud-form').style.display = 'none';
                ui.style.display = 'block';
                
                if(d.status === 'pending') {
                    ui.innerHTML = `<h3 style="color:orange;">Please wait for results...</h3>`;
                } else if(d.status === 'rejected') {
                    ui.innerHTML = `<h3 style="color:red;">Rejected</h3><p>Reason: ${d.reason}</p><button class="btn" onclick="clearAudition('${uid}')">I Understand & Try Again</button>`;
                } else {
                    ui.innerHTML = `<h3 style="color:var(--emerald);">ACCEPTED FOR ROLE: ${d.role}</h3><p>Check Discord!</p>`;
                }
            });
        }

        async function clearAudition(uid) {
            await db.collection('auditions').doc(uid).delete();
            location.reload();
        }

        // --- ADMIN ---
        async function addShow() {
            await db.collection('shows').add({
                day: parseInt(document.getElementById('adm-day').value),
                time: document.getElementById('adm-time').value
            });
            location.reload();
        }

        async function loadAdminData() {
            // Auditions
            db.collection('auditions').where('status', '==', 'pending').onSnapshot(snap => {
                const list = document.getElementById('adm-aud-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="admin-item">
                        <b>Role: ${d.role}</b> | User: ${d.discord}<br>
                        <input type="text" id="reason-${doc.id}" placeholder="Reason if rejecting">
                        <button onclick="updAud('${doc.id}', 'accepted')">Accept</button>
                        <button onclick="updAud('${doc.id}', 'rejected')">Reject</button>
                    </div>`;
                });
            });
            // Shows
            const snap = await db.collection('shows').get();
            const slist = document.getElementById('adm-show-list');
            slist.innerHTML = '';
            snap.forEach(doc => {
                slist.innerHTML += `<div class="admin-item">${doc.data().day} March - ${doc.data().time} <button class="btn-red" onclick="deleteShow('${doc.id}')">Delete</button></div>`;
            });
        }

        async function updAud(id, stat) {
            const reason = document.getElementById('reason-'+id).value;
            await db.collection('auditions').doc(id).update({ status: stat, reason: reason });
        }

        async function deleteShow(id) {
            if(confirm("Delete this show?")) {
                await db.collection('shows').doc(id).delete();
                location.reload();
            }
        }

        loadCalendar();
    </script>
</body>
</html>
