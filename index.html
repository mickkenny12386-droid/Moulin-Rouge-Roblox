<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked | Official Booking</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --emerald: #97d72e;
            --witch-black: #0a0a0a;
            --lvl1: #ffd700; /* Geel */
            --lvl2: #007bff; /* Blauw */
            --lvl3: #dc3545; /* Rood */
        }

        body { margin: 0; background: var(--witch-black); color: white; font-family: 'Montserrat', sans-serif; }

        /* Nav & Hero */
        nav { background: rgba(0,0,0,0.95); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 3px; }
        .hero { height: 300px; background: linear-gradient(rgba(0,0,0,0.6), var(--witch-black)), url('https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Header_Green_Texture.jpg'); background-size: cover; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* Hoofd Layout */
        .main-grid { max-width: 1400px; margin: -50px auto 50px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 0 20px; }
        .glass-card { background: rgba(15, 15, 15, 0.98); border: 1px solid var(--emerald); border-radius: 15px; padding: 25px; }

        /* Kalender (Zichtbaar voor iedereen) */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day { aspect-ratio: 1; border: 1px solid #222; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 5px; transition: 0.3s; }
        .day.active { cursor: pointer; border-color: var(--emerald); }
        .day.active:hover { background: rgba(151, 215, 46, 0.1); }

        /* HET SEATING PLAN (Horizontaal) */
        .theater-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        .podium { width: 300px; background: white; color: black; font-weight: bold; text-align: center; padding: 10px; margin-bottom: 30px; letter-spacing: 5px; }
        
        .main-seating { display: flex; justify-content: center; align-items: flex-start; gap: 30px; }
        
        .side-block { display: flex; flex-direction: column; gap: 4px; margin-top: 60px; }
        .center-block { display: flex; flex-direction: column; gap: 4px; }
        .back-block { margin-top: 40px; display: flex; flex-direction: column; gap: 4px; align-items: center; }

        .row { display: flex; gap: 3px; justify-content: center; }
        .seat { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        
        .s1 { background: var(--lvl1); } /* Geel */
        .s2 { background: var(--lvl2); } /* Blauw */
        .s3 { background: var(--lvl3); } /* Rood */
        .seat.taken { background: #444 !important; cursor: not-allowed; }

        /* Modal styling */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--emerald); z-index: 1000; width: 95%; max-width: 1100px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 900; }
        
        .btn { background: var(--emerald); color: black; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <nav>
        <div class="logo">WICKED ROBLOX</div>
        <div class="nav-links">
            <button id="admin-btn" style="display:none; background: gold; border:none; padding: 8px; margin-right: 10px; cursor:pointer;" onclick="openAdmin()">WITCH MASTER</button>
            <button class="btn" id="login-nav" onclick="openModal('auth-modal')">LOGIN</button>
        </div>
    </nav>

    <div class="hero">
        <h1>MARCH 2026</h1>
    </div>

    <div class="main-grid">
        <aside>
            <div class="glass-card">
                <h3 id="user-title">Gastenlijst</h3>
                <div id="user-tickets">Log in om te boeken.</div>
            </div>
        </aside>

        <main class="glass-card">
            <h2>SPEELSCHEMA MAART</h2>
            <div class="calendar" id="calendar"></div>
        </main>
    </div>

    <div class="modal" id="book-modal">
        <div class="theater-layout">
            <div class="podium">PODIUM</div>
            
            <div class="main-seating">
                <div class="side-block" id="left-side"></div>
                <div class="center-block" id="center-main"></div>
                <div class="side-block" id="right-side"></div>
            </div>

            <div class="back-block" id="back-ring"></div>
        </div>
    </div>

    <div class="modal" id="auth-modal" style="width: 300px;">
        <input type="email" id="auth-email" placeholder="Email" style="width:90%; margin-bottom:10px; padding:10px;">
        <input type="password" id="auth-pass" placeholder="Wachtwoord" style="width:90%; margin-bottom:10px; padding:10px;">
        <button class="btn" onclick="handleAuth()">BETREED OZ</button>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeShowId = null;

        // AUTH & SHOWS LADEN
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-nav').innerText = "LOGOUT";
                if(user.email === "virtual@gmail.com") document.getElementById('admin-btn').style.display = 'inline';
            }
            renderCalendar(); // Deze functie staat nu BUITEN de user check zodat iedereen shows ziet
        });

        async function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = 'Laden...';
            
            // Haal shows op uit Firestore
            const snap = await db.collection('shows').orderBy('day').get();
            const shows = {};
            snap.forEach(doc => shows[doc.data().day] = {id: doc.id, ...doc.data()});
            
            cal.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const s = shows[i];
                cal.innerHTML += `
                    <div class="day ${s ? 'active' : ''}" onclick="${s ? `openBooking('${s.id}')` : ''}">
                        <span style="font-size:12px;">${i}</span>
                        ${s ? `<b style="color:var(--emerald); font-size:10px;">${s.time}</b>` : ''}
                    </div>`;
            }
        }

        function openBooking(id) {
            activeShowId = id;
            buildSeating();
            openModal('book-modal');
        }

        // SEATING PLAN GENERATOR (Horizontaal)
        function buildSeating() {
            const left = document.getElementById('left-side');
            const center = document.getElementById('center-main');
            const right = document.getElementById('right-side');
            const back = document.getElementById('back-ring');

            left.innerHTML = ''; center.innerHTML = ''; right.innerHTML = ''; back.innerHTML = '';

            // Middenblok (Geel - Price Level 1)
            for(let r=0; r<20; r++) {
                const row = document.createElement('div'); row.className = 'row';
                for(let s=0; s<18; s++) row.innerHTML += `<div class="seat s1" onclick="bookSeat(${r*100+s})"></div>`;
                center.appendChild(row);
            }

            // Zijblokken (Blauw/Geel - Price Level 2/1)
            for(let r=0; r<12; r++) {
                const rowL = document.createElement('div'); rowL.className = 'row';
                const rowR = document.createElement('div'); rowR.className = 'row';
                for(let s=0; s<5; s++) {
                    rowL.innerHTML += `<div class="seat ${s<2 ? 's2' : 's1'}" onclick="bookSeat(${r*10+s})"></div>`;
                    rowR.innerHTML += `<div class="seat ${s>2 ? 's2' : 's1'}" onclick="bookSeat(${r*50+s})"></div>`;
                }
                left.appendChild(rowL); right.appendChild(rowR);
            }

            // Achterste Ringen (Rood - Price Level 3)
            for(let r=0; r<4; r++) {
                const row = document.createElement('div'); row.className = 'row';
                for(let s=0; s<40; s++) row.innerHTML += `<div class="seat s3" onclick="bookSeat(${r*200+s})"></div>`;
                back.appendChild(row);
            }
        }

        async function handleAuth() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(e, p);
                location.reload();
            } catch {
                await auth.createUserWithEmailAndPassword(e, p);
                location.reload();
            }
        }

        function openModal(id) { document.getElementById('overlay').style.display='block'; document.getElementById(id).style.display='block'; }
        function closeAll() { document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display='none'); }
    </script>
</body>
</html>
