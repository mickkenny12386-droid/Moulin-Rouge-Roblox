<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Netherlands</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --glass: rgba(0, 0, 0, 0.85); }
        
        body { 
            margin: 0; 
            /* De afbeelding van de twee heksen als achtergrond */
            background: url('https://static.nieuwsblad.be/Assets/Images_Upload/2024/05/15/8e14755a-4710-4828-b80c-7836881267f8.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Montserrat', sans-serif; 
        }

        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        
        nav { background: rgba(0,0,0,0.9); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; cursor: pointer; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; z-index: 1; position: relative; }
        .section-box { background: var(--glass); border: 1px solid var(--emerald); padding: 40px; border-radius: 15px; display: none; }
        .section-box.active { display: block; }

        /* Status berichten */
        .status-msg { padding: 15px; border-radius: 5px; margin-top: 10px; font-weight: bold; text-align: center; }
        .wait { background: rgba(255, 165, 0, 0.2); border: 1px solid orange; color: orange; }
        .accepted { background: rgba(151, 215, 46, 0.2); border: 1px solid var(--emerald); color: var(--emerald); }
        .rejected { background: rgba(255, 0, 0, 0.2); border: 1px solid red; color: red; }

        .admin-item { background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid gold; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        .btn { background: var(--emerald); color: black; padding: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 10px; }
        .login-btn { border: 1px solid var(--emerald); background: transparent; color: var(--emerald); padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <nav>
        <div style="font-family: 'Cinzel'; font-size: 24px; letter-spacing: 3px;">WICKED <span style="font-size: 12px; color: var(--emerald);">NETHERLANDS</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">The Show</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a onclick="showSection('newsletter')">Newsletter</a>
            <button class="login-btn" id="login-btn" onclick="openLogin()">LOG IN</button>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin')">Admin Panel</a>
        </div>
    </nav>

    <div class="container">
        <section id="login-section" class="section-box">
            <h2>Login</h2>
            <input type="text" id="username-input" placeholder="Enter username (virtual2025)">
            <button class="btn" onclick="processLogin()">LOGIN</button>
        </section>

        <section id="audities" class="section-box">
            <h2>Audition for Wicked Netherlands</h2>
            <div id="audition-content">
                <input type="text" id="aud-name" placeholder="What's your name?">
                <input type="number" id="aud-age" placeholder="How old are you?">
                <input type="text" id="aud-discord" placeholder="What's your Discord name?">
                <textarea id="aud-exp" placeholder="What's your experience?"></textarea>
                <select id="aud-avail">
                    <option value="yes">I can attend every rehearsal</option>
                    <option value="no">I have some limitations</option>
                </select>
                <button class="btn" onclick="submitAudition()">SUBMIT AUDITION</button>
            </div>
            <div id="audition-status" style="display:none;"></div>
        </section>

        <section id="admin" class="section-box">
            <h2 style="color:gold;">AUDITION MANAGEMENT</h2>
            <div id="admin-auditions-list">Loading submissions...</div>
        </section>

        <section id="theshow" class="section-box active"><h2>The Show</h2><p>Welcome to the Emerald City of the Netherlands!</p></section>
        <section id="newsletter" class="section-box"><h2>Newsletter</h2><p>Latest updates coming soon.</p></section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = localStorage.getItem('wicked_user') || null;

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openLogin() {
            if(currentUser) {
                localStorage.removeItem('wicked_user');
                location.reload();
            } else {
                showSection('login-section');
            }
        }

        function processLogin() {
            const user = document.getElementById('username-input').value;
            if(user === "virtual2025") {
                currentUser = "virtual2025";
                localStorage.setItem('wicked_user', user);
                checkUserAccess();
                showSection('admin');
            } else {
                alert("Unknown user.");
            }
        }

        function checkUserAccess() {
            if(currentUser === "virtual2025") {
                document.getElementById('admin-nav').style.display = 'block';
                document.getElementById('login-btn').innerText = "LOG OUT";
                loadAdminAuditions();
            }
        }

        async function submitAudition() {
            const data = {
                name: document.getElementById('aud-name').value,
                age: document.getElementById('aud-age').value,
                discord: document.getElementById('aud-discord').value,
                experience: document.getElementById('aud-exp').value,
                availability: document.getElementById('aud-avail').value,
                status: 'pending',
                reason: '',
                timestamp: Date.now()
            };
            
            await db.collection('auditions').add(data);
            localStorage.setItem('has_auditioned', 'true');
            showStatus('wait', 'Please wait for results');
        }

        function showStatus(type, text) {
            const statusDiv = document.getElementById('audition-status');
            const contentDiv = document.getElementById('audition-content');
            contentDiv.style.display = 'none';
            statusDiv.style.display = 'block';
            statusDiv.className = `status-msg ${type}`;
            statusDiv.innerText = text;
        }

        async function loadAdminAuditions() {
            const list = document.getElementById('admin-auditions-list');
            const snap = await db.collection('auditions').get();
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.innerHTML = `
                    <b>${d.name}</b> (${d.discord})<br>
                    <small>${d.experience}</small><br>
                    <button class="btn" style="width:auto; font-size:10px; background:green;" onclick="updateStatus('${doc.id}', 'accepted')">Accept</button>
                    <button class="btn" style="width:auto; font-size:10px; background:red;" onclick="updateStatus('${doc.id}', 'rejected')">Reject</button>
                    <input type="text" id="reason-${doc.id}" placeholder="Reason for rejection" style="width:200px; display:inline-block; font-size:10px;">
                `;
                list.appendChild(item);
            });
        }

        async function updateStatus(id, newStatus) {
            const reason = document.getElementById(`reason-${id}`).value;
            await db.collection('auditions').doc(id).update({
                status: newStatus,
                reason: reason
            });
            alert("Status updated!");
            loadAdminAuditions();
        }

        // Check login bij opstarten
        checkUserAccess();
        if(localStorage.getItem('has_auditioned')) showStatus('wait', 'Please wait for results');
    </script>
</body>
</html>
