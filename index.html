<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Cast & Auditions</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --gold: #d4af37; --glass: rgba(0, 0, 0, 0.92); --border: rgba(151, 215, 46, 0.4); }
        body { margin: 0; background: #000; background-image: linear-gradient(180deg, #000 0%, #050505 60%, #1a3300 100%); background-attachment: fixed; color: white; font-family: 'Montserrat', sans-serif; }
        
        nav { background: rgba(0,0,0,0.95); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel'; font-size: 24px; letter-spacing: 4px; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-left: 15px; }
        .nav-links a:hover { color: white; text-shadow: 0 0 10px var(--emerald); }

        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 15px; display: none; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .section-box.active { display: block; animation: fadeIn 0.4s; }

        /* Cast Card Styling */
        .cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .cast-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 20px; text-align: center; border-radius: 10px; transition: 0.3s; }
        .cast-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .cast-card h3 { color: var(--gold); font-family: 'Cinzel'; margin: 0; font-size: 18px; }
        .cast-card p { margin: 5px 0 0; font-style: italic; color: #ccc; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.07); border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: 800; cursor: pointer; border-radius: 5px; text-transform: uppercase; width: 100%; transition: 0.3s; }
        .btn:hover { background: white; box-shadow: 0 0 15px var(--emerald); }

        .admin-item { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">Schedule</a>
            <a onclick="showSection('cast-section')">Cast</a>
            <a onclick="showSection('newsletter')">News</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin-panel')">Wizard Panel</a>
            <a id="login-link" onclick="showSection('login-page')">Login</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="cast-section" class="section-box active">
            <h2>The Citizens of Oz</h2>
            <div id="cast-display" class="cast-grid">
                </div>
        </section>

        <section id="audities" class="section-box">
            <h2>Stage Door Auditions</h2>
            <div id="aud-form-container">
                <input type="text" id="aud-discord" placeholder="Discord Username (e.g. user#1234)">
                <input type="text" id="aud-role" placeholder="Role you are auditioning for">
                <textarea id="aud-exp" placeholder="Tell us about your musical experience..."></textarea>
                <button class="btn" onclick="submitAudition()">Submit Audition</button>
            </div>
            <div id="aud-status-msg" style="display:none; text-align:center; padding:20px; color:var(--emerald);"></div>
        </section>

        <section id="admin-panel" class="section-box" style="border-color: gold;">
            <h2 style="color:gold;">Witch Master Dashboard</h2>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                <div>
                    <h3>Manage Cast</h3>
                    <input type="text" id="cast-role" placeholder="Role Name (e.g. Elphaba)">
                    <input type="text" id="cast-name" placeholder="Actor Name">
                    <button class="btn" style="background:var(--gold);" onclick="addCastMember()">Add to Cast</button>
                    <div id="admin-cast-list" style="margin-top:20px;"></div>
                </div>

                <div>
                    <h3>Pending Auditions</h3>
                    <div id="admin-aud-list"></div>
                </div>
            </div>
            <button class="btn" style="background:red; color:white; margin-top:30px;" onclick="adminLogout()">Logout Admin</button>
        </section>

        <section id="login-page" class="section-box">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Login</button>
            <button class="btn" style="background:none; border:1px solid white; color:white;" onclick="handleAuth('signup')">Sign Up</button>
            <p onclick="adminLoginPrompt()" style="color:gold; cursor:pointer; text-align:center; margin-top:20px;">Admin Access</p>
        </section>

        <section id="theshow" class="section-box"><h2>Performance Schedule</h2><div id="calendar"></div></section>
        <section id="newsletter" class="section-box"><h2>Emerald City Times</h2><div id="news-list"></div></section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- CAST FUNCTIES ---
        async function addCastMember() {
            const role = document.getElementById('cast-role').value;
            const name = document.getElementById('cast-name').value;
            if(!role || !name) return alert("Fill in both fields");
            await db.collection('cast').add({ role, name, order: Date.now() });
            location.reload();
        }

        function loadCast() {
            db.collection('cast').orderBy('order').onSnapshot(snap => {
                const display = document.getElementById('cast-display');
                const adminList = document.getElementById('admin-cast-list');
                display.innerHTML = '';
                adminList.innerHTML = '<h4>Active Cast:</h4>';
                
                snap.forEach(doc => {
                    const d = doc.data();
                    display.innerHTML += `<div class="cast-card"><h3>${d.role}</h3><p>${d.name}</p></div>`;
                    adminList.innerHTML += `<div class="admin-item">${d.role}: ${d.name} <button onclick="deleteDoc('cast','${doc.id}')" style="background:none; color:red; border:none; cursor:pointer;">[X]</button></div>`;
                });
            });
        }

        // --- AUDITIE FUNCTIES ---
        async function submitAudition() {
            const user = auth.currentUser;
            if(!user) return alert("Log in first to audition!");
            
            const audData = {
                uid: user.uid,
                email: user.email,
                discord: document.getElementById('aud-discord').value,
                role: document.getElementById('aud-role').value,
                exp: document.getElementById('aud-exp').value,
                timestamp: Date.now()
            };

            await db.collection('auditions').doc(user.uid).set(audData);
            document.getElementById('aud-form-container').style.display = 'none';
            document.getElementById('aud-status-msg').style.display = 'block';
            document.getElementById('aud-status-msg').innerText = "Audition submitted! The Wizard will review your application.";
        }

        function loadAuditionsAdmin() {
            db.collection('auditions').orderBy('timestamp', 'desc').onSnapshot(snap => {
                const list = document.getElementById('admin-aud-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="admin-item">
                            <b style="color:var(--emerald);">Discord: ${d.discord}</b><br>
                            <b>Role:</b> ${d.role}<br>
                            <small><b>Experience:</b> ${d.exp}</small><br>
                            <button class="btn" style="width:auto; padding:5px; margin-top:5px; background:red; color:white;" onclick="deleteDoc('auditions','${doc.id}')">Remove</button>
                        </div>`;
                });
            });
        }

        // --- AUTH & ADMIN ---
        function adminLoginPrompt() {
            if(prompt("Admin Key:") === "Virtualentertainment2025!") {
                localStorage.setItem('is_admin', 'true');
                location.reload();
            }
        }

        function adminLogout() {
            localStorage.removeItem('is_admin');
            location.reload();
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-link').innerText = user.email.split('@')[0];
            }
            if(localStorage.getItem('is_admin') === 'true') {
                document.getElementById('admin-nav').style.display = 'inline-block';
                loadAuditionsAdmin();
            }
        });

        async function deleteDoc(col, id) {
            if(confirm("Are you sure?")) await db.collection(col).doc(id).delete();
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type === 'signup') await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) { alert(err.message); }
        }

        // Initial Load
        loadCast();
    </script>
</body>
</html>
